name: Web Archive Capture Worker

on:
  schedule:
    - cron: "0 14 * * *"   # Daily at 14:00 UTC (≈ 08:00 Alberta MDT)
  workflow_dispatch:
    inputs:
      capture_mode:
        description: 'IMMEDIATE (new URLs) or SCHEDULED (due URLs)'
        required: false
        default: "SCHEDULED"

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run capture worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CAPTURE_MODE: ${{ github.event.inputs.capture_mode || 'SCHEDULED' }}
        run: node worker/capture.js
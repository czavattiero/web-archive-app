name: Web Archive Capture Worker

on:
  schedule:
    - cron: "0 14 * * *"  # 2 PM UTC = 9 AM Alberta time (during daylight saving)
  workflow_dispatch:
    inputs:
      immediate:
        description: 'Immediate capture (new URL) or scheduled'
        required: false
        default: "false"

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run capture worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          IMMEDIATE_CAPTURE: ${{ github.event.inputs.immediate }}
        run: node worker/capture.js
name: Web Archive Cleanup Worker

on:
  schedule:
    - cron: "0 15 * * *"   # Daily at 15:00 UTC (≈ 09:00 Alberta MDT)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Validate worker syntax
        run: node --check worker/*.js

      - name: Lint worker files
        run: npx eslint worker/

      - name: Run cleanup worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: node worker/cleanup.js
